<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact InfraBuild</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">
    <span>INFRABUILD</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<!-- HERO -->
<section class="contact-hero reveal">
  <h1>Let’s Build the <span>Future Together</span></h1>
  <p>Have an idea or want to collaborate? We’d love to hear from you.</p>
</section>

<!-- CONTACT FORM -->
<section class="contact-wrapper">
  <form
  class="contact-form reveal"
  id="contactForm"
  action="https://formspree.io/f/YOUR_FORM_ID"
  method="POST"
>

  <input type="text" name="name" placeholder="Full Name" required>

  <input type="email" name="email" placeholder="Email Address" required>

  <input type="text" name="company" placeholder="Company / Organization">

  <textarea name="message" placeholder="Your Message" required></textarea>

  <button type="submit">
    <span class="btn-text">Send Message</span>
    <span class="spinner"></span>
  </button>

  <!-- SUCCESS MESSAGE -->
  <p class="form-success">
    ✅ Thank you! Your message has been sent successfully.
  </p>

</form>
</section>

</body>
</html>
